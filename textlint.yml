name: textlint

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run textlint
        run: npx textlint ./docs/**/*.md

      - name: Force fail for Slack test
        run: exit 1
