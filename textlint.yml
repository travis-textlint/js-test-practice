name: textlint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run textlint
        if: github.event_name == 'pull_request'
        run: npx textlint ./docs/**/*.md

      # PR の lint が失敗したときだけ通知
      - name: Notify Slack on PR failure
        if: failure() && github.event_name == 'pull_request'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#ff0000",
                  "title": "❌ textlint failed on PR #${{ github.event.pull_request.number }}",
                  "fields": [
                    {
                      "title": "Author",
                      "value": "${{ github.actor }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.head_ref }}",
                      "short": true
                    }
                  ],
                  "footer": "GitHub Actions"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # main に push されたときだけ成功通知
      - name: Notify Slack on main success
        if: success() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#36a64f",
                  "title": "✅ textlint succeeded on main",
                  "fields": [
                    {
                      "title": "Commit",
                      "value": "${{ github.event.head_commit.message }}",
                      "short": false
                    }
                  ],
                  "footer": "GitHub Actions"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
