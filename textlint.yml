name: textlint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run textlint
        id: textlint
        run: |
          npx textlint "**/*.md" > textlint_result.txt 2>&1 || true

      - name: Encode textlint result
        id: encode
        run: |
          echo "encoded=$(base64 -w 0 textlint_result.txt)" >> $GITHUB_OUTPUT

      - name: Notify Slack with textlint result
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.textlint.outcome == 'success' && '#36a64f' || '#ff0000' }}",
                  "title": "📘 textlint result",
                  "fields": [
                    {
                      "title": "Status",
                      "value": "${{ steps.textlint.outcome }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.ref }}",
                      "short": true
                    }
                  ],
                  "text": "Base64 encoded log:\n${{ steps.encode.outputs.encoded }}",
                  "footer": "GitHub Actions"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
