name: textlint

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run textlint
        run: npx textlint ./docs/**/*.md

      - name: Force fail for Slack test
        run: exit 1

      # 失敗時（PR のときだけ通知）
      - name: Notify Slack on PR failure
        if: failure() && github.event_name == 'pull_request'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ textlint failed on PR #${{ github.event.pull_request.number }} by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # 成功時（main push のときだけ通知）
      - name: Notify Slack on success
        if: success() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ textlint succeeded on main branch"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
