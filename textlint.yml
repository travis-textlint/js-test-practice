name: textlint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  textlint:
    runs-on: ubuntu-latest

    steps:
      # Slack test（必ず実行される）
      - name: Slack test (always)
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: '{"text": "Slack test message from GitHub Actions"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # リポジトリをチェックアウト
      - uses: actions/checkout@v4

      # 依存関係をインストール
      - name: Install dependencies
        run: npm install

      # textlint を実行（PR のときだけ）
      - name: Run textlint
        if: github.event_name == 'pull_request'
        run: |
          cd $GITHUB_WORKSPACE
          npx textlint "**/*.md"
        continue-on-error: true

      # textlint が失敗したときだけ Slack 通知（PR）
      - name: Notify Slack on PR failure
        if: failure() && github.event_name == 'pull_request'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#ff0000",
                  "title": "❌ textlint failed on PR #${{ github.event.pull_request.number }}",
                  "fields": [
                    {
                      "title": "Author",
                      "value": "${{ github.actor }}",
                      "short": true
                    },
                    {
                      "title": "Branch",
                      "value": "${{ github.head_ref }}",
                      "short": true
                    }
                  ],
                  "footer": "GitHub Actions"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # main push が成功したときだけ Slack 通知
      - name: Notify Slack on main success
        if: success() && github.ref == 'refs/heads/main'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "#36a64f",
                  "title": "✅ textlint succeeded on main",
                  "fields": [
                    {
                      "title": "Commit",
                      "value": "${{ github.event.head_commit.message }}",
                      "short": false
                    }
                  ],
                  "footer": "GitHub Actions"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
