name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  main-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check textlint version
        run: npx textlint --version

      - name: Run Textlint
        run: |
          # Markdown を確実に拾うため find を使用
          find . -name "*.md" -print0 | xargs -0 npx textlint > textlint_result.txt

      - name: Show Textlint result in log
        run: cat textlint_result.txt

      - name: Upload Textlint result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: textlint-result
          path: textlint_result.txt

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "CI finished with status: ${{ job.status }}\nTextlint result is available as an artifact.\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
