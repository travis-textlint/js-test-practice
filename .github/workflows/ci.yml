name: Main CI

on:
  push:
    branches: [ main ]

jobs:
  main-check:
    runs-on: ubuntu-latest

    steps:
      - name: 開始時間を記録
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存関係インストール
        run: npm ci

      - name: Jest テスト（カバレッジ付き）
        run: npm test -- --coverage

      - name: textlint 実行
        run: npm run lint:text
        continue-on-error: true

      - name: カバレッジ読み取り
        id: coverage
        run: |
          LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: 終了時間を記録
        id: end
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Slack 通知（成功・失敗）
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "CI 結果: ${{ job.status }}" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "CI が完了いたしました。\n\n📌 *リポジトリ:* ${{ github.repository }}\n🔢 *コミット:* ${{ github.sha }}\n👤 *実行者:* ${{ github.actor }}\n⏱️ *実行時間:* $(( ${{ steps.end.outputs.time }} - ${{ steps.start.outputs.time }} )) 秒"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📊 *カバレッジ（Lines）:* ${{ steps.coverage.outputs.lines }}%\n\n${
                      ${{ steps.coverage.outputs.lines }} < 90
                      && "⚠️ *注意:* カバレッジが 90% を下回っています。品質向上のため、追加のテストをご検討ください。"
                      || "🎉 *素晴らしいです！* カバレッジは 90% 以上です！"
                    }"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📈 *カバレッジ グラフ風表示*\n```\nLines:      [${{ steps.coverage.outputs.lines }}%]\n目標:       [90%]\n```"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
