name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  main-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check textlint version
        run: npx textlint --version

      - name: Debug list target files
        run: |
          echo "Markdown files:"
          find . -type f -name "*.md" ! -path "./node_modules/*"
          echo "AsciiDoc files:"
          find . -type f -name "*.adoc" ! -path "./node_modules/*"

      - name: Run Textlint
        run: |
          FILES=$(find . -type f \( -name "*.md" -o -name "*.adoc" \) ! -path "./node_modules/*")
          if [ -z "$FILES" ]; then
            echo "No markdown or adoc files found." > textlint_result.txt
            exit 0
          fi

          npx textlint $FILES > textlint_result.txt || true

      - name: Show Textlint result in log
        run: cat textlint_result.txt

      - name: Upload Textlint result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: textlint-result
          path: textlint_result.txt

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "CI finished with status: ${{ job.status }}\nTextlint result is available as an artifact.\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
