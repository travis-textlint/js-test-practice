name: Main CI

on:
  push:
    branches: [ main ]

jobs:
  main-check:
    runs-on: ubuntu-latest

    steps:
      - name: 開始時間を記録
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存関係インストール
        run: npm ci

      - name: Jest テスト（カバレッジ付き）
        run: npm test -- --coverage

      - name: textlint 実行（docs/ 配下のみ）
        run: textlint "docs/**/*.md"
        continue-on-error: true

      - name: カバレッジ読み取り
        id: coverage
        run: |
          LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          STATEMENTS=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq '.total.functions.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT

      - name: 終了時間を記録
        id: end
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Slack 通知（成功・失敗）
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "CI 結果: ${{ job.status }}" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "CI が完了いたしました。\n\n📌 *リポジトリ:* ${{ github.repository }}\n🔢 *コミット:* ${{ github.sha }}\n👤 *実行者:* ${{ github.actor }}\n⏱️ *実行時間:* $(( ${{ steps.end.outputs.time }} - ${{ steps.start.outputs.time }} )) 秒"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📊 *カバレッジ*\nLines: ${{ steps.coverage.outputs.lines }}%\nStatements: ${{ steps.coverage.outputs.statements }}%\nFunctions: ${{ steps.coverage.outputs.functions }}%\nBranches: ${{ steps.coverage.outputs.branches }}%"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text":
                      ${{ steps.coverage.outputs.lines < 90 &&
                      '"⚠️ *注意:* Lines カバレッジが 90% を下回っています。品質向上のため、追加のテストをご検討ください。"' ||
                      '"🎉 *素晴らしいです！* Lines カバレッジは 90% 以上です！"' }}
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📈 *カバレッジ グラフ風表示*\n```\nLines:      [${{ steps.coverage.outputs.lines }}%]\nStatements: [${{ steps.coverage.outputs.statements }}%]\nFunctions:  [${{ steps.coverage.outputs.functions }}%]\nBranches:   [${{ steps.coverage.outputs.branches }}%]\n目標:       [90%]\n```"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
