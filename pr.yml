      - name: Slack 通知（成功・失敗どちらも）
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "PR CI が完了しました" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "📌 *リポジトリ:* ${{ github.repository }}\n📝 *PR タイトル:* ${{ github.event.pull_request.title }}\n🔗 *PR URL:* ${{ github.event.pull_request.html_url }}\n👤 *実行者:* ${{ github.actor }}\n📄 *変更ファイル数:* ${{ steps.diff.outputs.files }}\n📊 *差分行数:* ${{ steps.diff.outputs.lines }}\n⏱️ *実行時間:* $(( ${{ steps.end.outputs.time }} - ${{ steps.start.outputs.time }} )) 秒\n📣 *結果:* ${{ job.status }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
