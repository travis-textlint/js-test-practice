name: PR CI

on:
  pull_request:

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - name: 開始時間を記録
        id: start
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存関係インストール
        run: npm ci

      - name: Jest テスト実行
        run: npm test

      - name: textlint 実行（docs/ 配下のみ）
        run: textlint "docs/**/*.md"
        continue-on-error: true

      - name: 差分情報取得
        id: diff
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | wc -l)
          LINES=$(git diff --numstat ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | awk '{added+=$1; deleted+=$2} END {print added+deleted}')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT

      - name: 終了時間を記録
        id: end
        run: echo "time=$(date +%s)" >> $GITHUB_OUTPUT

      -
