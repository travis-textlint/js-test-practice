name: PR CI

on:
  pull_request:

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存関係インストール
        run: npm ci

      - name: Jest テスト実行
        run: npm test

      - name: textlint 実行
        run: npm run lint:text

      - name: Slack 通知（失敗時のみ）
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "🚨 PR CI が失敗しました" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "ご確認をお願いいたします。\n\n📌 *リポジトリ:* ${{ github.repository }}\n📝 *PR タイトル:* ${{ github.event.pull_request.title }}\n👤 *実行者:* ${{ github.actor }}\n🌿 *ブランチ:* ${{ github.head_ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
